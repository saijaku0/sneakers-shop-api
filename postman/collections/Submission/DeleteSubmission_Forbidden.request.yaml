$kind: http-request
name: DeleteSubmission_Forbidden
url: "{{baseUrl}}/api/v1/dropperssubmissions/{{submissionId}}"
method: DELETE
auth:
  type: bearer
  credentials:
    token: "{{accessToken}}"
scripts:
  - type: beforeRequest
    code: "const loginResponse = await pm.sendRequest({\r

      \    url: pm.environment.get(\"baseUrl\") + \"/api/v1/auth/login\",\r

      \    method: \"POST\",\r

      \    header: { \"Content-Type\": \"application/json\" },\r

      \    body: {\r

      \        mode: \"raw\",\r

      \        raw: JSON.stringify({\r

      \            email: \"dropper2@test.com\",\r

      \            password: \"Dropper1234!\"\r

      \        })\r

      \    }\r

      });\r

      \r

      const response = loginResponse.json();\r

      pm.environment.set(\"accessToken\", response.accessToken);"
    language: text/javascript
  - type: afterResponse
    code: "pm.test(\"Cannot delete someone else's submission\", () => {\r

      \    pm.response.to.have.status(409);\r

      });"
    language: text/javascript
