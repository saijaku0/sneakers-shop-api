name: Push settings

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd=pg_isready 
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      - name: Setup dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Install dependencies
        run: dotnet restore
      
      - name: Build dotnet
        run: dotnet build --no-restore --configuration Release
      
      - name: Install dotnet-ef
        run: dotnet tool install --global dotnet-ef

      - name: Add dotnet tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Run migrations
        run: dotnet ef database update --project src/Sneakers.Shop.Backend.Infrastructure --startup-project src/Sneakers.Shop.Backend.Api
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=${{ secrets.POSTGRES_DB }};User Id=${{ secrets.POSTGRES_USER }};Password=${{ secrets.POSTGRES_PASSWORD }};

      - name: Run Api
        run: dotnet run --project src/Sneakers.Shop.Backend.Api --configuration Release --no-launch-profile &
        env:
          ASPNETCORE_ENVIRONMENT: Development
          ASPNETCORE_URLS: "http://localhost:5000"
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=${{ secrets.POSTGRES_DB }};User Id=${{ secrets.POSTGRES_USER }};Password=${{ secrets.POSTGRES_PASSWORD }};"
          JwtSettings__SecretKey: ${{ secrets.JWT_SECRET_KEY }}

      - name: Wait for API
        run: |
          for i in {1..30}; do
            curl -s http://localhost:5000/health && break
            echo "Waiting for API... attempt $i"
            sleep 2
          done

      - name: Install Postman CLI
        run: sudo npm install -g postman-cli

      - name: Postman Auth
        run: postman login --with-api-key ${{ secrets.POSTMAN_KEY }}

      - name: Generate dummy test file
        run: |
          mkdir -p postman/files
          dd if=/dev/zero of=postman/files/test-image.jpg bs=1024 count=10

      - name: Run Postman tests
        run: |
          EXIT_CODE=0
          
          for dir in postman/collections/*/; do
            # Убираем слеш на конце для красоты путей
            dir=${dir%*/}
            
            echo "Running collection in: $dir"
            
            postman collection run "$dir" \
              --environment postman/environments/SneakersShopCI.postman_environment.json \
              --working-dir postman/files \
              --verbose || EXIT_CODE=1
          done
          
          exit $EXIT_CODE

